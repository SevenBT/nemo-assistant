name: Bug 反馈
description: 报告一个问题或异常
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填全下面的信息，方便定位问题。
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？期望的行为是什么？
      placeholder: 清晰描述遇到的问题…
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何一步步重现这个问题？
      placeholder: |
        1. 打开 …
        2. 点击 …
        3. 看到 …
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统版本、Python 版本；从源码运行还是打包版。
      placeholder: |
        - OS: Windows 11 23H2
        - Python: 3.11.x
        - 运行方式: 源码 / 打包 exe
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 若有 crash.log 或控制台错误栈，请粘贴到这里。
      render: text
    validations:
      required: false
