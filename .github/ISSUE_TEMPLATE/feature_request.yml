name: 功能建议
description: 提出一个新功能或改进想法
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能想解决什么痛点？现在的做法有什么不便？
      placeholder: 目前在做 X 的时候，我不得不…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他考虑过的方案
      description: 有没有替代做法或类似产品的参考？
    validations:
      required: false
